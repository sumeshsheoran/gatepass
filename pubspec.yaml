name: security_guard_app
description: Security Guard Management App — visitor tracking, approvals, multi-company

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.3.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Image
  image_picker: ^1.1.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  equatable: ^2.0.5

  # Local Notifications
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
